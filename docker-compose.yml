version: '1'
services:
  factura-bot:
    build: .
    ports:
      - "8081:8080"
    environment:
      TZ: America/Merida
      DB_URL: jdbc:postgresql://postgres-db:5432/factura_db
      DB_USER_NAME: postgres_dev
      DB_PASSWORD: password_dev
      TELEGRAM_BOT_TOKEN:
      TELEGRAM_BOT_NAME:
      TELEGRAM_BOT_CHAT_ID:
    depends_on:
      - postgres-db

  postgres-db:
    image: postgres:18
    container_name: postgres_container
    environment:
      POSTGRES_USER: postgres_dev
      POSTGRES_PASSWORD: password_dev
      POSTGRES_DB: factura_db
    ports:
      - 5431:5432
    volumes:
      - db_data:/var/lib/postgresql

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin_container
    environment:
        PGADMIN_DEFAULT_EMAIL: admin@email.com
        PGADMIN_DEFAULT_PASSWORD: admin
    ports:
        - 5050:80
    depends_on:
        - postgres-db

volumes:
  db_data:

